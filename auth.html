<!doctype html>
<html lang="lv">
<head>
  <title>Autorizācija • Garīgās veselības centrs</title>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="assets/favicon.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700&family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/style.css">
  <style>
    body.auth-page { margin: 0; font-family: "Roboto", sans-serif; background: linear-gradient(135deg, #d7efe1, #ffffff); min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .auth-container { width: 100%; max-width: 420px; padding: 45px 35px; background: rgba(255, 255, 255, 0.88); backdrop-filter: blur(12px); border-radius: 22px; box-shadow: 0 25px 60px rgba(0,0,0,0.08); text-align: center; }
    .auth-container h2 { margin: 0 0 10px; font-family: "Montserrat", sans-serif; color: #2F6F4E; font-size: 26px; }
    .auth-container p { margin: 0 0 18px; color: #5D5D5D; font-size: 14px; }
    .auth-container input { width: 100%; padding: 15px; margin-bottom: 14px; border-radius: 14px; border: 1px solid #e0e0e0; background: rgba(255,255,255,0.9); font-size: 14px; transition: all 0.25s ease; }
    .auth-container input:focus { border-color: #4CAF50; box-shadow: 0 0 10px rgba(76,175,80,0.25); outline: none; }
    .auth-buttons { display: flex; flex-direction: column; gap: 12px; margin-top: 10px; }
    .btn-login { background: linear-gradient(135deg, #4CAF50, #2e7d32); color: white; padding: 14px; border-radius: 14px; border: none; font-family: "Montserrat", sans-serif; cursor: pointer; transition: 0.25s; }
    .btn-register { background: transparent; border: 1px solid #c8e6c9; color: #2F6F4E; padding: 14px; border-radius: 14px; font-family: "Montserrat", sans-serif; cursor: pointer; transition: 0.25s; }
    .btn-login:hover { transform: translateY(-2px); box-shadow: 0 10px 25px rgba(76,175,80,0.3); }
    .btn-register:hover { background: #e8f5e9; transform: translateY(-2px); }
    #authStatus { margin-top: 15px; font-size: 14px; color: #555; min-height: 1.2em; }
    .auth-links { margin-top: 14px; font-size: 14px; }
    .auth-links a { color: #2F6F4E; text-decoration: none; font-weight: 600; }
    .auth-lang { display:flex; justify-content:flex-end; margin-bottom: 10px; }
    .auth-lang select { border-radius: 12px; border: 1px solid #d9e3da; padding: 8px 10px; background: #fff; }
  </style>
</head>
<body class="auth-page" data-page-title="auth.title">
  <div class="auth-container">
    <div class="auth-lang">
      <select id="langSelect" aria-label="Valodas izvēle">
        <option value="lv">LV</option>
        <option value="ru">RU</option>
        <option value="en">EN</option>
      </select>
    </div>
    <h2 data-i18n="auth.heading">Ienākt / Reģistrēties</h2>
    <p data-i18n="auth.subtitle">Izmanto savu e-pastu un paroli, lai piekļūtu kontam.</p>

    <input id="email" type="email" data-i18n-placeholder="about.form.email" placeholder="E-pasts">
    <input id="password" type="password" data-i18n-placeholder="auth.password" placeholder="Parole">

    <div class="auth-buttons">
      <button class="btn-register" type="button" onclick="register()" data-i18n="auth.register">Reģistrēties</button>
      <button class="btn-login" type="button" onclick="login()" data-i18n="common.auth.login">Ienākt</button>
    </div>

    <p id="authStatus" aria-live="polite"></p>

    <div class="auth-links">
      <a href="index.html" data-i18n="auth.back">Atpakaļ uz sākumlapu</a>
    </div>
  </div>

  <script src="js/main.js" defer></script>
  <script src="js/auth.js"></script>
</body>
</html>
